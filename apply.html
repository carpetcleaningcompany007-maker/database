<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apply to Join | Vetted Carpet Cleaners</title>
  <meta name="description" content="Apply to become a listed vetted carpet cleaner.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header slim">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Vetted Carpet Cleaners</a>
      <nav class="nav">
        <a href="find.html">Find a Cleaner</a>
        <a href="how-it-works.html">How Vetting Works</a>
        <a href="apply.html">Apply</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container narrow">
      <div class="section-head left">
        <span class="eyebrow">Cleaner applications</span>
        <h1>Apply to become a vetted cleaner</h1>
        <p>This is the public application form. In the live version this would submit into Supabase and notify the admin dashboard.</p>
      </div>

      <form class="form card two-col">
        <label>Business name<input type="text" placeholder="Your trading name"></label>
        <label>Owner name<input type="text" placeholder="Your full name"></label>
        <label>Email<input type="email" placeholder="name@example.com"></label>
        <label>Phone<input type="tel" placeholder="07..."></label>
        <label>Website<input type="url" placeholder="https://"></label>
        <label>Primary town<input type="text" placeholder="Main town you cover"></label>
        <label class="full">Counties and towns covered<textarea placeholder="List your service area"></textarea></label>
        <label class="full">Services offered<textarea placeholder="Carpet cleaning, upholstery cleaning, stain removal..."></textarea></label>
        <label class="full">Equipment and methods<textarea placeholder="Truck mount, portable, CRB, hot water extraction, encap..."></textarea></label>
        <label>Insurance expiry<input type="date"></label>
        <label>Upload insurance proof<input type="file"></label>
        <label class="full"><input type="checkbox"> I confirm the information supplied is accurate and can be checked.</label>
        <div class="full"><button type="button" class="btn btn-primary">Submit Application</button></div>
      </form>
    </div>
  </main>
</body>
</html>
