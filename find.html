<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Find a Cleaner | Vetted Carpet Cleaners</title>
  <meta name="description" content="Search trusted carpet cleaners by town, service, and vetting badge.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header slim">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Vetted Carpet Cleaners</a>
      <nav class="nav">
        <a href="find.html">Find a Cleaner</a>
        <a href="how-it-works.html">How Vetting Works</a>
        <a href="apply.html">Apply</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-head left">
        <span class="eyebrow">Directory demo</span>
        <h1>Find a vetted cleaner</h1>
        <p>Use the filters below. This page runs from sample JSON now, but it is ready to be wired into Supabase.</p>
      </div>

      <div class="filters card">
        <label>
          Town or postcode
          <input id="searchInput" type="text" placeholder="Search location">
        </label>
        <label>
          Service
          <select id="serviceFilter">
            <option value="">Any service</option>
          </select>
        </label>
        <label>
          Badge
          <select id="badgeFilter">
            <option value="">Any badge</option>
          </select>
        </label>
      </div>

      <div id="resultsCount" class="results-count"></div>
      <div id="listingGrid" class="card-grid three"></div>
    </div>
  </main>

  <script src="assets/js/find.js"></script>
</body>
</html>
